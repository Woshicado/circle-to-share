name: Release APK

# Build a signed release APK and attach it to the GitHub Release whenever a
# version tag (e.g. v1.2) is pushed. Requires these repository secrets:
#   KEYSTORE_BASE64    - base64 of your release keystore (.jks)
#   KEYSTORE_PASSWORD  - keystore (store) password
#   KEY_ALIAS          - key alias
#   KEY_PASSWORD       - key password
# See RELEASING.md.

on:
  push:
    tags:
      - 'v*'
  # Allow re-running manually against the default branch.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Stage APK with version in the name
        run: |
          mkdir -p dist
          NAME="${GITHUB_REF_NAME:-manual}"
          cp app/build/outputs/apk/release/app-release.apk "dist/circle-to-share-${NAME}.apk"

      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: circle-to-share-apk
          path: dist/*.apk

      - name: Attach APK to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          fail_on_unmatched_files: true
